# gradle.properties
pluginGroup = com.adobe.clawdea
pluginName = ClawDEA
pluginVersion = 1.6.1

platformType = IC
platformVersion = 2026.1

javaVersion = 21

# Don't bundle kotlin-stdlib — use the one shipped with the IntelliJ platform
kotlin.stdlib.default.dependency = false
kotlinVersion = 2.2.0
intellijPlatformPluginVersion = 2.13.1

# Optional Scala plugin integration (sub-project #4). Loaded only when the user
# has the IntelliJ Scala plugin installed; see clawdea-scala.xml.
scalaPluginId = org.intellij.scala
scalaPluginVersion = 2026.1.20

# To run Gradle with a specific JVM, create gradle-local.properties or set JAVA_HOME.
# Example: org.gradle.java.home=/path/to/java21

# Heap for Gradle and the Kotlin compiler daemon. CI runners (and CodeQL extraction
# alongside the build) OOM with the defaults; 4g matches what IntelliJ plugin
# builds typically need.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx4g
